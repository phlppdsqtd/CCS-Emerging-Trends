<div class="max-w-4xl mx-auto p-8 bg-white rounded-lg shadow-md mt-10">
  <h2 class="text-3xl font-extrabold text-gray-900 mb-8">Create New Blog Post</h2>

  <form action="#" method="POST" enctype="multipart/form-data">
    
    <div class="mb-6">
      <label class="block text-sm font-semibold text-gray-700 mb-2">Cover Image</label>
      <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-lg hover:border-blue-500 transition-colors bg-gray-50">
        <div class="space-y-1 text-center">
          <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
            <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <div class="flex text-sm text-gray-600 justify-center mt-2">
            <label for="image-upload" class="relative cursor-pointer bg-transparent rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none">
              <span>Upload a file</span>
              <input id="image-upload" name="image-upload" type="file" class="sr-only" accept="image/*">
            </label>
            <p class="pl-1">or drag and drop</p>
          </div>
          <p class="text-xs text-gray-500 mt-1">PNG, JPG, WEBP up to 5MB</p>
        </div>
      </div>
    </div>

    <div class="mb-6">
      <label for="title" class="block text-sm font-semibold text-gray-700 mb-2">Post Title</label>
      <input type="text" id="title" name="title" placeholder="Enter an engaging title..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow">
    </div>

    <div class="mb-6">
      <label for="writer" class="block text-sm font-semibold text-gray-700 mb-2">Writer</label>
      <input type="text" id="writer" name="writer" placeholder="Author name" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow">
    </div>

    <div class="mb-8">
      <label for="content" class="block text-sm font-semibold text-gray-700 mb-2">Content</label>
      <textarea id="content" name="content" rows="12" placeholder="Write your blog post here..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow resize-y"></textarea>
    </div>

    <div class="flex justify-end space-x-4 border-t pt-6">
      <button type="button" class="px-6 py-2.5 border border-gray-300 rounded-lg text-gray-700 bg-white hover:bg-gray-50 font-medium transition-colors">Save Draft</button>
      <button type="submit" class="px-6 py-2.5 rounded-lg text-white bg-blue-600 hover:bg-blue-700 font-medium shadow-sm transition-colors">Publish Post</button>
    </div>

  </form>
</div>
